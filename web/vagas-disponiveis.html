<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagas Disponíveis — Diária da Cidade</title>
<meta name="description" content="Veja vagas de diária e bicos na sua cidade ou home office. Candidate-se grátis.">
<meta name="robots" content="noindex, follow">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/trabalhador-web.css">
</head>
<body class="trabalhador-app">
<header class="web-nav">
  <a href="/trabalhe.html" class="logo"><span class="logo-mark">📅</span> Diária da Cidade</a>
  <div id="web-nav-auth" class="web-nav-auth"></div>
</header>
<main class="page-wide">
  <h1>Olá, <span id="hello-name">—</span>! Encontre seu próximo trabalho</h1>
  <p class="sub">Vagas perto de você e home office · candidate-se em um clique</p>
  <div id="filter-chips" class="filter-scroll"></div>
  <div class="search-row">
    <input id="job-search" type="search" placeholder="Buscar por título, descrição ou cidade…" autocomplete="off">
  </div>
  <div style="text-align:right;margin-bottom:12px;">
    <button type="button" class="nav-btn" id="btn-sair" style="color:var(--dark);border-color:var(--line);">Sair</button>
  </div>
  <div id="jobs-list"></div>
  <div id="empty-state" class="empty-state panel-hidden">
    <p><strong>Nenhuma vaga disponível na sua cidade agora.</strong></p>
    <p>Mas novas vagas aparecem todo dia — volte amanhã!</p>
    <button type="button" class="btn-primary" id="btn-nationwide" style="max-width:320px;margin:0 auto;">Ver vagas em todo o Brasil</button>
  </div>
</main>
<div id="apply-modal" class="modal-backdrop panel-hidden" role="dialog" aria-modal="true">
  <div class="modal-sheet">
    <h2>Confirmar candidatura</h2>
    <div id="apply-modal-body"></div>
    <label for="apply-message" style="display:block;font-size:12px;font-weight:700;color:var(--soft);margin:12px 0 6px;">Mensagem inicial (opcional)</label>
    <textarea id="apply-message" placeholder="Olá! Tenho interesse nesta vaga."></textarea>
    <button type="button" class="btn-primary" id="btn-confirm-apply">Confirmar candidatura</button>
    <button type="button" class="btn-secondary" id="btn-cancel-apply">Cancelar</button>
  </div>
</div>
<div id="toast" class="toast panel-hidden" role="status"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/job-categories.js"></script>
<script src="/js/trabalhador-auth.js"></script>
<script src="/js/web-nav.js"></script>
<script src="/js/vagas-disponiveis.js"></script>
</body>
</html>
