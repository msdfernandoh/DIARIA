<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publicar Vaga — Diária da Cidade</title>
<meta name="description" content="Publique sua vaga de diária em minutos. Encontre trabalhadores disponíveis hoje na sua cidade.">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Publicar Vaga — Diária da Cidade">
<meta property="og:description" content="Contrate trabalhadores por diária de forma rápida e segura.">
<meta property="og:url" content="https://diariadacidade.com.br/publicar-vaga.html">
<meta property="og:type" content="website">
<link rel="canonical" href="https://diariadacidade.com.br/publicar-vaga.html">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/empregador-web.css">
</head>
<body>
<header class="web-nav">
  <a href="/contrate.html" class="logo"><span class="logo-mark">📅</span> Diária da Cidade</a>
  <div id="web-nav-auth" class="web-nav-auth"></div>
</header>
<main class="page">
  <h1>Publicar vaga</h1>
  <p class="sub">Preencha os dados. Publicação gratuita — candidatos da sua região veem no app.</p>
  <form id="job-form" class="form-card">
    <label for="titulo">Título da vaga *</label>
    <input id="titulo" required maxlength="80" placeholder="Ex.: Garçom para evento sábado">
    <label for="categoria">Categoria *</label>
    <select id="categoria" required></select>
    <label>Tipo *</label>
    <div class="radio-row">
      <label class="radio-pill"><input type="radio" name="tipo" value="diaria" checked> Diária</label>
      <label class="radio-pill"><input type="radio" name="tipo" value="emprego_fixo"> Emprego fixo</label>
      <label class="radio-pill"><input type="radio" name="tipo" value="remoto"> Remoto</label>
    </div>
    <label for="data_inicio">Data *</label>
    <input id="data_inicio" type="date" required>
    <label for="horario_inicio">Horário início</label>
    <input id="horario_inicio" type="time">
    <label for="horario_fim">Horário fim</label>
    <input id="horario_fim" type="time">
    <label for="valor">Valor R$ *</label>
    <input id="valor" type="number" min="1" step="0.01" required placeholder="150">
    <label for="vagas_total">Quantidade de vagas</label>
    <input id="vagas_total" type="number" min="1" value="1">
    <label>Formato</label>
    <div class="radio-row">
      <label class="radio-pill"><input type="radio" name="formato" value="presencial" checked> Presencial</label>
      <label class="radio-pill"><input type="radio" name="formato" value="remoto"> Home Office</label>
      <label class="radio-pill"><input type="radio" name="formato" value="hibrido"> Híbrido</label>
    </div>
    <div id="cep-block">
      <label for="cep">CEP do local</label>
      <input id="cep" inputmode="numeric" placeholder="00000-000">
      <label for="endereco_local">Endereço</label>
      <input id="endereco_local" placeholder="Rua, bairro">
      <label for="cidade_local">Cidade</label>
      <input id="cidade_local" required>
      <label for="estado_local">UF</label>
      <input id="estado_local" maxlength="2" style="text-transform:uppercase">
    </div>
    <label for="descricao">Descrição</label>
    <textarea id="descricao" maxlength="500" placeholder="Detalhes da vaga…"></textarea>
    <p class="job-meta"><span id="desc-count">0</span>/500 caracteres</p>
    <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:14px;color:var(--dark);">
      <input type="checkbox" id="urgente"> Urgente
    </label>
    <button type="submit" class="btn-primary" id="btn-publicar">Publicar vaga grátis 🚀</button>
    <p id="form-msg" class="form-msg" role="status"></p>
  </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/job-categories.js"></script>
<script src="/js/empregador-auth.js"></script>
<script src="/js/publicar-vaga.js"></script>
</body>
</html>
