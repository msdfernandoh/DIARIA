<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diária da Cidade — Abrindo o app</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0d14;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 1.25rem; font-weight: 800; margin: 0 0 8px; }
    p { color: rgba(255,255,255,.7); margin: 0 0 24px; max-width: 320px; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #1d9e75;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a.fallback { color: #7eb8ff; font-size: 14px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="logo">📅</div>
  <h1>Abrindo o app...</h1>
  <p id="msg">Aguarde um instante.</p>
  <div class="spinner" aria-hidden="true"></div>
  <a class="fallback" id="fallback" href="#" style="display:none">Continuar no site</a>
  <script>
    (function () {
      var WEB = "https://diariadacidade.com.br";
      var SCHEME = "diariadacidade";
      var APP_STORE = "https://apps.apple.com/app/id0000000000";
      var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.diariacidade.app";

      var path = window.location.pathname.replace(/^\//, "");
      var parts = path ? path.split("/").filter(Boolean) : [];
      var kind = parts[0] || "";
      var arg = parts[1] ? decodeURIComponent(parts[1]) : "";

      var deepPath = path;
      var deep = SCHEME + "://" + deepPath;

      var ua = navigator.userAgent || "";
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var isMobile = isIOS || isAndroid;

      function webFallback() {
        if (kind === "ref" && arg) return WEB + "/parceiro?codigo=" + encodeURIComponent(arg);
        if (kind === "vaga" && arg) return WEB + "/trabalhe";
        if (kind === "qr") return WEB + "/trabalhe";
        return WEB;
      }

      var fb = document.getElementById("fallback");
      fb.href = webFallback();
      fb.style.display = "inline";

      if (!isMobile) {
        document.getElementById("msg").textContent = "Redirecionando para o site...";
        window.location.replace(webFallback());
        return;
      }

      window.location.href = deep;
      setTimeout(function () {
        if (isIOS) window.location.href = APP_STORE;
        else if (isAndroid) window.location.href = PLAY_STORE;
        else window.location.replace(webFallback());
      }, 2000);
    })();
  </script>
</body>
</html>
